 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radians and Degree Conversion</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
</head>

<body>
  <div id="calculator">
    <label for="formula">Conversion:</label>
    <select id="formula" onchange="showInputs()">
      <option value="1">Radians to Degrees</option>
      <option value="2">Degrees to Radians</option>
    </select>

    <div id="inputs"></div>
  
    <button onclick="calculate()">Calculate</button>
    <p id="result"></p>
  </div>
</body>
</html>
